apis:
  - aid: engagespot:notifications-api
    name: Engagespot Notifications API
    description: >
      The Engagespot REST API enables sending multi-channel notifications to
      users, listing and deleting notification records, managing user accounts
      and preferences, triggering and canceling notification workflows, and
      building customizable in-app notification inboxes. The API supports both
      backend authentication via API key and secret headers and frontend
      user-level authentication via API key plus user ID or JWT bearer tokens.
