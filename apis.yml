aid: engagespot
name: Engagespot
description: >
  Engagespot is a notification infrastructure platform that provides developers
  with a unified REST API to send multi-channel notifications including in-app,
  email, web push, mobile push, SMS, WhatsApp, Slack, Discord, and webhooks from
  a single integration. The platform includes a pre-built customizable in-app
  notification inbox, a visual workflow editor for complex messaging logic, and
  a fine-grained user preference management system. Engagespot handles over 850
  million monthly notifications and 3.7 billion API requests with 99.98% uptime,
  supporting data residency in both US and EU regions. Teams can manage
  notification templates, monitor delivery logs, and connect to third-party
  providers such as SendGrid, AWS SES, Firebase, Twilio, and APNS through a
  centralized dashboard.
